<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Gestus</title>
    <style>
        :root {
            --primary-orange: #FF5722;
            --deep-blue: #2C5697;
            --bg-neutral: #F4F7F6;
            --white: #FFFFFF;
            --text-dark: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-neutral);
            margin: 0;
            color: var(--text-dark);
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 25px;
            padding: 0 20px;
        }

        /* Tarjeta Lateral de Usuario */
        .sidebar-card {
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #ddd;
            margin: 0 auto 15px;
            border: 4px solid var(--deep-blue);
            object-fit: cover;
        }

        .user-name {
            font-size: 1.4rem;
            color: var(--deep-blue);
            margin-bottom: 5px;
        }

        .user-role {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 20px;
        }

        /* Área de Contenido Principal */
        .main-content {
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        h2 {
            border-bottom: 2px solid var(--bg-neutral);
            padding-bottom: 10px;
            color: var(--deep-blue);
            font-weight: 500;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 25px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            background: var(--bg-neutral);
        }

        .btn-save {
            background-color: var(--primary-orange);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 30px;
            transition: transform 0.2s;
        }

        .btn-save:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        /* Sección de estadísticas de LSM */
        .stats-section {
            margin-top: 40px;
            padding: 20px;
            background: #f0f4ff;
            border-radius: 8px;
            border-left: 5px solid var(--deep-blue);
        }

        /* Estilo para el botón de cerrar sesión */
        .btn-logout {
            display: inline-block;
            margin-top: 20px;
            color: #d32f2f;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: color 0.2s;
        }

        .btn-logout:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container">
        <aside class="sidebar-card">
            <div class="profile-pic"></div>
            <div class="user-name">Usuario Gestus</div>
            <div class="user-role">Estudiante TSU</div>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
            <p style="font-size: 0.8rem; color: #888;">Miembro desde: Marzo 2026</p>

            <!--Enlace de cerrar sesión-->
            <!--
            <a href="/logout" class="btn-logout">Cerrar Sesión</a>
            -->
            <a href="#" onclick="cerrarSesion()" class="btn-logout">Cerrar Sesión</a>
        </aside>

        <!--Botón de tachita para regresar al inicio-->
        <main class="main-content">
            <div style="text-align: right; margin-bottom: -20px;">
                <a href="enrollment.html"
                    style="text-decoration: none; color: #999; font-size: 1.5rem; font-weight: bold;">&times;</a>
            </div>

            <h2>Configuración de Cuenta</h2>

            <form action="/update-profile" method="POST">
                <div class="form-grid">
                    <div class="input-group">
                        <label>Nombre Completo</label>
                        <input type="text" name="fullname" placeholder="Ej. Juan Pérez">
                    </div>
                    <div class="input-group">
                        <label>Correo Electrónico</label>
                        <input type="email" name="email" value="usuario@example.com">
                    </div>
                    <div class="input-group">
                        <label>Contraseña Actual</label>
                        <input type="password" name="current_pass">
                    </div>
                    <div class="input-group">
                        <label>Nueva Contraseña</label>
                        <input type="password" name="new_pass">
                    </div>
                </div>

                <div class="stats-section">
                    <h3 style="margin-top:0; font-size: 1rem;">Progreso de Aprendizaje LSM</h3>
                    <p style="font-size: 0.9rem;">Señas dominadas: <strong>12</strong></p>
                    <p style="font-size: 0.9rem;">Última práctica: Hoy - Gesto "Hola"</p>
                </div>

                <!--
                <button type="submit" class="btn-save">Actualizar Datos</button>
                -->

                <a href="actualizarDatos.html" class="btn-save"
                    style="text-decoration: none; display: inline-block; text-align: center;">
                    Actualizar Datos
                </a>
            </form>
        </main>
    </div>

    <!--Función de cerrar sesión-->
    <script>
        function cerrarSesion() {
            // Borramos el estado de login de la memoria del navegador
            localStorage.removeItem('usuarioLogueado');

            // Redirigimos al index o al login
            alert("Sesión cerrada correctamente.");
            window.location.href = 'index.html';
        }
    </script>

</body>

</html>
