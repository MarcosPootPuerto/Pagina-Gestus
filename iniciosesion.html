<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>
    <link rel="icon" href="examen topicos.png" type="image/png">
    <link rel="stylesheet" href="Iniciosesion.css">
<link rel="stylesheet" href="Formularios.css">

</head>
<body>
    <div class="login-card">
        <span class="close-btn"><a href="index.html">&times;</a></span>
        <h3 class="blue-title">INICIAR SESIÓN</h3>

        <div class="register-links">
            <a href="Estudiante.html">REGISTRARSE COMO ESTUDIANTE</a>
            <a href="Profesor.html">REGISTRARSE COMO PROFESOR</a>
        </div>

        <script src="https://accounts.google.com/gsi/client" async defer></script>

        <div id="g_id_onload"
            data-client_id="825367747434-9pcfejfcmpnjtbsvaeu00bfbo231ar66.apps.googleusercontent.com"
            data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard"></div>

        <script>
        function handleCredentialResponse(response) {
            // Aquí recibes el token de Google
            console.log("Encoded JWT ID token: " + response.credential);
            
            // Lo ideal es enviar este token a tu PHP para validarlo
            // Por ahora, esto conectará el clic con tu sistema.
        }
        </script>

        <div class="divider">
            <span>´¿YA TIENES CUENTA?</span>
        </div>

        <form>
            <input type="text" placeholder="Correo electrónico" required>
            <input type="password" placeholder="Contraseña" required>
            <button type="submit" class="submit-btn">INICIAR SESIÓN</button>
        </form>


    </div>
</body>
</html>
